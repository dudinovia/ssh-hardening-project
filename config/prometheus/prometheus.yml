# @file prometheus.yml
# @brief Конфигурация сбора метрик для SSH Hardening проекта
# @version 1.0.0
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'ssh-server'
    static_configs:
      - targets: ['ssh-server:2222']
    metrics_path: '/metrics'
    # SSH не экспортирует метрики нативно, поэтому используем blackbox_exporter логику
    # или оставляем как healthcheck-индикатор. Для учебных целей достаточно node-exporter.
