# @file docker-compose.yml
# @brief Оркестрация инфраструктуры защищённого SSH-сервера
# @version 1.0.0

# Якорь для общих настроек (чтобы не дублировать restart и networks)
x-common-settings: &common-settings
  restart: unless-stopped
  networks:
    - ssh-network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ==============================================================================
  # 1. SSH SERVER (Основной сервис)
  # ==============================================================================
  ssh-server:
    <<: *common-settings
    build:
      context: .
      dockerfile: docker/ssh-server/Dockerfile
      target: final
      args:
        SSH_PORT: ${SSH_PORT:-2222}
    container_name: ssh-hardened-server
    hostname: ssh-server
    ports:
      - "${SSH_PORT:-2222}:${SSH_PORT:-2222}"
    volumes:
      - ../config/sshd_config:/etc/ssh/sshd_config:ro
      - ssh-keys:/etc/ssh/keys
    environment:
      - SSH_PORT=${SSH_PORT:-2222}
      - MFA_ENABLED=${MFA_ENABLED:-false}
      - TZ=Europe/Moscow
    healthcheck:
      test: ["CMD-SHELL", "sshd -t && nc -z localhost ${SSH_PORT:-2222} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ==============================================================================
  # 2. PROMETHEUS (Мониторинг метрик)
  # ==============================================================================
  prometheus:
    <<: *common-settings
    image: prom/prometheus:v2.51.0
    container_name: ssh-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # ==============================================================================
  # 3. GRAFANA (Визуализация)
  # ==============================================================================
  grafana:
    <<: *common-settings
    image: grafana/grafana:10.4.0
    container_name: ssh-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ==============================================================================
  # 4. NODE EXPORTER (Метрики ОС)
  # ==============================================================================
  node-exporter:
    <<: *common-settings
    image: prom/node-exporter:v1.7.0
    container_name: ssh-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

# ==============================================================================
# СЕТИ (Root level)
# ==============================================================================
networks:
  ssh-network:
    driver: bridge

# ==============================================================================
# ТОМА (Root level)
# ==============================================================================
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  ssh-keys:
    driver: local
